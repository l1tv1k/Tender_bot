services:
  # === База Данных (PostgreSQL) ===
  db:
    image: postgres:15-alpine
    container_name: tender_db
    environment:
      POSTGRES_USER: ${DB_USER:-tender_user}
      POSTGRES_PASSWORD: ${DB_PASS:-tender_password}
      POSTGRES_DB: ${DB_NAME:-tender_bot_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

  # === Брокер сообщений (Redis) ===
  redis:
    image: redis:7-alpine
    container_name: tender_redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  # === Микросервис Парсера (Воркер) ===
  parser:
    build: ./parser
    container_name: tender_parser_worker
    depends_on: [db, redis]
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-tender_user}
      - DB_PASS=${DB_PASS:-tender_password}
      - DB_NAME=${DB_NAME:-tender_bot_db}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./data/tenders:/data/tenders
      - ./parser/search_profiles.json:/app/search_profiles.json:ro
    restart: unless-stopped

  # === Планировщик задач (Celery Beat) ===
  parser-beat:
    build: ./parser
    container_name: tender_parser_beat
    depends_on: [redis]
    command: celery -A tasks beat --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./parser/search_profiles.json:/app/search_profiles.json:ro
    restart: unless-stopped

  # === Микросервис ИИ-Агент ===
  ai_agent:
    build: ./ai_agent
    container_name: tender_ai_agent
    depends_on: [db, redis]
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-tender_user}
      - DB_PASS=${DB_PASS:-tender_password}
      - DB_NAME=${DB_NAME:-tender_bot_db}
      - REDIS_URL=redis://redis:6379/0
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
    volumes:
      - ./data/tenders:/data/tenders
    restart: unless-stopped

  # === Микросервис Telegram Бот ===
  tg_bot:
    build: ./bot
    container_name: tender_tg_bot
    depends_on: [db, redis]
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-tender_user}
      - DB_PASS=${DB_PASS:-tender_password}
      - DB_NAME=${DB_NAME:-tender_bot_db}
      - REDIS_URL=redis://redis:6379/0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_PROXY_URL=${TELEGRAM_PROXY_URL}
      - TELEGRAM_POLLING_TIMEOUT=${TELEGRAM_POLLING_TIMEOUT:-2}
      - TELEGRAM_API_TIMEOUT=${TELEGRAM_API_TIMEOUT:-8}
      - TELEGRAM_DOCUMENT_TIMEOUT=${TELEGRAM_DOCUMENT_TIMEOUT:-90}
      - TELEGRAM_DOCUMENT_TRANSPORT=${TELEGRAM_DOCUMENT_TRANSPORT:-mtproto}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - MTPROTO_SESSION_PATH=${MTPROTO_SESSION_PATH:-/data/mtproto/tender_bot}
      - MTPROTO_CONNECT_TIMEOUT=${MTPROTO_CONNECT_TIMEOUT:-20}
      - MTPROTO_USE_OBFUSCATED=${MTPROTO_USE_OBFUSCATED:-true}
      - TELEGRAM_EDIT_RETRY_ATTEMPTS=${TELEGRAM_EDIT_RETRY_ATTEMPTS:-3}
      - TELEGRAM_RETRY_BASE_DELAY=${TELEGRAM_RETRY_BASE_DELAY:-1}
      - DB_POOL_MIN_SIZE=${DB_POOL_MIN_SIZE:-1}
      - DB_POOL_MAX_SIZE=${DB_POOL_MAX_SIZE:-5}
      - ADMIN_TG_ID=${ADMIN_TG_ID}
    volumes:
      - ./data/tenders:/data/tenders:ro
      - ./data/mtproto:/data/mtproto
    restart: unless-stopped

volumes:
  postgres_data:
